<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MVCGrid — Live WebAssembly Demo</title>
    <link rel="icon" href="data:," />
    <!-- (empty favicon to avoid a stray 404) -->
    <!-- No <base> tag: everything is referenced relatively so the app works under a
         sub-path deployment such as GitHub Pages' /MVCGrid.Net/demo/. -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css" />
</head>
<body>
    <div class="container" style="padding-top: 20px;">
        <h1>People</h1>
        <p class="text-muted">
            The MVCGrid engine is running <strong>entirely in your browser</strong> via .NET WebAssembly —
            no server. Sorting, paging, filtering and CSV export all execute client-side through
            <code>MVCGrid.Wasm</code> feeding the unchanged <code>MVCGrid.js</code>.
        </p>

        <div class="row" style="margin-bottom: 10px;">
            <div class="col-md-7 form-inline">
                <div class="form-group">
                    <label>First name:
                        <input type="text" class="form-control" placeholder="filter"
                               data-mvcgrid-type="filter" data-mvcgrid-option="FirstName"
                               data-mvcgrid-name="peopleGrid" data-mvcgrid-apply-filter="keyup" />
                    </label>
                </div>
                <div class="form-group">
                    <label>Last name:
                        <input type="text" class="form-control" placeholder="filter"
                               data-mvcgrid-type="filter" data-mvcgrid-option="LastName"
                               data-mvcgrid-name="peopleGrid" data-mvcgrid-apply-filter="keyup" />
                    </label>
                </div>
            </div>
            <div class="col-md-5 text-right form-inline">
                <label>Page size:
                    <select class="form-control" data-mvcgrid-type="pageSize" data-mvcgrid-name="peopleGrid">
                        <option>10</option>
                        <option>25</option>
                        <option>50</option>
                    </select>
                </label>
                <button class="btn btn-default" data-mvcgrid-type="export" data-mvcgrid-name="peopleGrid">
                    Export CSV
                </button>
            </div>
        </div>

        <!-- The MVCGrid shell + first page are injected here by main.js on boot. -->
        <div id="grid-host">
            <p class="text-muted"><em>Loading the .NET runtime…</em></p>
        </div>
    </div>

    <!-- jQuery first (MVCGrid.js depends on it), then Bootstrap, then the WASM boot. -->
    <script src="https://code.jquery.com/jquery-3.6.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/js/bootstrap.min.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
