<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Person Detail — MVCGrid WASM Demo</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css" />
</head>
<body>
    <div class="container" style="padding-top: 20px;">
        <h1>Person <span id="id"></span></h1>
        <p>
            This is the detail page linked from the grid's <strong>View</strong> column. The link was
            generated by the grid's <code>UrlHelper.Action(...)</code> call, mapped to a static page by
            <code>WasmUrlBuilder</code>.
        </p>
        <a href="index.html" class="btn btn-default">&laquo; Back to grid</a>
    </div>
    <script>
        document.getElementById('id').textContent =
            new URLSearchParams(location.search).get('id') || '';
    </script>
</body>
</html>
