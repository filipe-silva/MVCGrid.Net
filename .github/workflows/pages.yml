name: Deploy GitHub Pages (WASM showcase)

# Publishes the .NET WebAssembly showcase (MVCGrid.Example.Wasm) and deploys it as the
# whole GitHub Pages site (root: https://filipe-silva.github.io/MVCGrid.Net/). It is both
# the interactive demo and the docs — there is no separate Jekyll site.
#
# One-time setup: repo Settings -> Pages -> Source = "GitHub Actions".

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Publish the WASM app
        run: dotnet publish tst/MVCGrid.Example.Wasm/MVCGrid.Example.Wasm.csproj -c Release -o wasmpub

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: wasmpub/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
